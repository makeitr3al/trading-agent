name: Trading Agent
version: "0.2.0"
slug: trading_agent
description: Run the trading agent as a one-shot Home Assistant OS add-on controlled by Home Assistant UI helpers.
url: https://example.invalid/local/trading-agent
arch:
  - aarch64
  - amd64
  - armv7
  - armhf
startup: application
boot: manual
init: false
map:
  - type: share
    read_only: false
  - type: addon_config
    read_only: false
options:
  repo_path: /share/trading-agent
  data_path: /share/trading-agent-data
  propr_beta_api_key: ""
  propr_prod_api_key: ""
  propr_prod_confirm: false
  propr_require_healthy_core: true
  hyperliquid_interval: 1d
  hyperliquid_lookback_bars: 200
schema:
  repo_path: str
  data_path: str
  propr_beta_api_key: password?
  propr_prod_api_key: password?
  propr_prod_confirm: bool
  propr_require_healthy_core: bool
  hyperliquid_interval: str
  hyperliquid_lookback_bars: int
