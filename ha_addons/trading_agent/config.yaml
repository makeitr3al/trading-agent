name: Trading Agent
version: "0.4.5"
slug: trading_agent
description: One-shot Trading Agent with integrated Journal
url: https://github.com/makeitr3al/trading-agent
image: ghcr.io/makeitr3al/{arch}-trading-agent-addon
arch:
  - aarch64
  - amd64
startup: once
boot: auto
init: false
hassio_api: true
hassio_role: homeassistant
map:
  - type: config
    read_only: false
  - type: share
    read_only: false
  - type: addon_config
    read_only: false
options:
  data_path: /share/trading-agent-data
  propr_beta_api_key: ""
  propr_prod_api_key: ""
  propr_prod_confirm: false
  propr_require_healthy_core: true
  hyperliquid_interval: 1d
  hyperliquid_lookback_bars: 200
schema:
  data_path: str
  propr_beta_api_key: password?
  propr_prod_api_key: password?
  propr_prod_confirm: bool
  propr_require_healthy_core: bool
  hyperliquid_interval: str
  hyperliquid_lookback_bars: int


