name: Publish HA Add-on Image

on:
  push:
    branches:
      - master
    paths:
      - '.github/workflows/publish-ha-addon-image.yml'
      - 'ha_addons/trading_agent/**'
      - 'app/**'
      - 'broker/**'
      - 'config/**'
      - 'data/**'
      - 'indicators/**'
      - 'models/**'
      - 'propr/**'
      - 'scripts/**'
      - 'strategy/**'
      - 'utils/**'
      - 'main.py'
      - 'managed_runner.py'
      - 'operator_config.py'
      - 'journal_snapshot.py'
      - 'journal_table.py'
      - 'run_summary.py'
      - 'runtime_config.py'
      - 'run_test_suite.py'
      - 'requirements.txt'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
          - arch: aarch64
            platform: linux/arm64
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Resolve add-on version
        id: version
        run: |
          version=$(sed -n 's/^version: "\([^"]*\)".*/\1/p' ha_addons/trading_agent/config.yaml | tr -d '\r')
          if [ -z "$version" ]; then
            echo "ERROR: Could not extract version from ha_addons/trading_agent/config.yaml" >&2
            exit 1
          fi
          echo "Resolved version: ${version}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        if: matrix.arch == 'aarch64'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push add-on image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ha_addons/trading_agent/Dockerfile
          push: true
          platforms: ${{ matrix.platform }}
          provenance: false
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/trading-agent-addon-buildcache:${{ matrix.arch }}
          cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/trading-agent-addon-buildcache:${{ matrix.arch }},mode=max
          build-args: |
            BUILD_FROM=ghcr.io/home-assistant/${{ matrix.arch }}-base:3.21
            BUILD_ARCH=${{ matrix.arch }}
            BUILD_VERSION=${{ steps.version.outputs.version }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ matrix.arch }}-trading-agent-addon:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/${{ matrix.arch }}-trading-agent-addon:latest
